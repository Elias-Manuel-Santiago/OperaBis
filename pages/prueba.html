<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Opera Bis — Logo animado</title>
    <style>
        :root {
            --bg: #241016;
            --ink: #ffffff;
            --stroke-width: 16;
            --draw-duration: 2.6s;
            --fill-duration: 0.9s;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }

        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        #logo {
            width: min(70vw, 520px);
            height: auto;
            overflow: visible;
        }

        #logo path {
            stroke-dasharray: 93241.2421875;
            stroke-dashoffset: 200;

            fill: var(--ink);
            fill-opacity: 1;
            stroke: var(--ink);


            /* Definimos ambas transiciones juntas para evitar conflictos */

            animation: dibujar 3s ease forwards infinite;
        }

        #logo path.filled {
            fill-opacity: 1;
        }

        button {
            background: transparent;
            color: var(--ink);
            border: 1px solid rgba(255, 255, 255, .4);
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: .05em;
            cursor: pointer;
            opacity: .7;
        }

        button:hover {
            opacity: 1;
        }

    </style>
</head>
